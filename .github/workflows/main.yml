name: STAR SMP - Minecraft Server

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Session duration (hours)'
        required: false
        default: '3'
        type: choice
        options: ['1', '2', '3']
  repository_dispatch:
    types: [start-server]

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      # ══════════════════════════════════════════
      # 1. Checkout
      # ══════════════════════════════════════════
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      # ══════════════════════════════════════════
      # 2. Java 21
      # ══════════════════════════════════════════
      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ══════════════════════════════════════════
      # 3. Session Duration
      # ══════════════════════════════════════════
      - name: ⚙️ Set Session Duration
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            D="${{ github.event.client_payload.duration }}"
          else
            D="${{ github.event.inputs.duration }}"
          fi
          D="${D:-3}"
          echo "DURATION=${D}" >> $GITHUB_ENV
          echo "SESSION_SECONDS=$((D * 3600))" >> $GITHUB_ENV
          echo "✅ Session: ${D}h"

      # ══════════════════════════════════════════
      # 4. Download PaperMC 1.21.1
      # ══════════════════════════════════════════
      - name: 📥 Download PaperMC 1.21.1
        run: |
          rm -f server.jar
          echo "Fetching latest stable PaperMC 1.21.1 build..."
          # Fixed API URL from fill.papermc.io to api.papermc.io
          LATEST_BUILD=$(curl -s "https://api.papermc.io/v2/projects/paper/versions/1.21.1" | python3 -c "import sys, json; print(json.load(sys.stdin)['builds'][-1])")
          DL_URL="https://api.papermc.io/v2/projects/paper/versions/1.21.1/builds/${LATEST_BUILD}/downloads/paper-1.21.1-${LATEST_BUILD}.jar"
          curl -fSL -o server.jar "$DL_URL"
          ls -lh server.jar
          echo "✅ PaperMC 1.21.1 ready"

      # ══════════════════════════════════════════
      # 5. EULA
      # ══════════════════════════════════════════
      - name: 📝 Accept EULA
        run: echo "eula=true" > eula.txt

      # ══════════════════════════════════════════
      # 6. server.properties
      # ══════════════════════════════════════════
      - name: ⚙️ Setup server.properties
        run: |
          if [ ! -f server.properties ]; then
            cat > server.properties << 'EOF'
          server-port=25565
          online-mode=false
          max-players=20
          view-distance=8
          simulation-distance=5
          difficulty=normal
          gamemode=survival
          spawn-protection=0
          motd=\u00a7b\u00a7lSTAR SMP \u00a7r\u00a77| Java + Bedrock
          allow-nether=true
          enable-command-block=true
          EOF
            echo "✅ server.properties created"
          else
            echo "✅ Existing server.properties kept"
          fi

      # ══════════════════════════════════════════
      # 7. Download All Plugins (Fixed Auto-Download)
      # ══════════════════════════════════════════
      - name: 🔌 Download Plugins
        run: |
          mkdir -p plugins
          cd plugins

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   Downloading STAR SMP Plugins (15)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # ── CROSSPLAY ─────────────────────────────────────────

          echo "[1/15] ViaVersion..."
          curl -fSL -o ViaVersion.jar "https://github.com/ViaVersion/ViaVersion/releases/latest/download/ViaVersion-5.3.2.jar" || \
          curl -fSL -o ViaVersion.jar "https://hangarcdn.papermc.io/plugins/ViaVersion/ViaVersion/versions/5.3.2/PAPER/ViaVersion-5.3.2.jar"

          echo "[2/15] ViaBackwards..."
          curl -fSL -o ViaBackwards.jar "https://github.com/ViaVersion/ViaBackwards/releases/latest/download/ViaBackwards-5.3.2.jar" || \
          curl -fSL -o ViaBackwards.jar "https://hangarcdn.papermc.io/plugins/ViaVersion/ViaBackwards/versions/5.3.2/PAPER/ViaBackwards-5.3.2.jar"

          echo "[3/15] Geyser..."
          curl -fSL -o Geyser-Spigot.jar "https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot"

          echo "[4/15] Floodgate..."
          curl -fSL -o floodgate-spigot.jar "https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot"

          # ── PERMISSIONS & CORE ────────────────────────────────

          echo "[5/15] LuckPerms..."
          LP_URL=$(curl -s "https://metadata.luckperms.net/data/all" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['downloads']['bukkit'])")
          curl -fSL -o LuckPerms.jar "$LP_URL"

          echo "[6/15] VaultUnlocked..."
          curl -fSL -o VaultUnlocked.jar "https://github.com/milkdrinkers/Vault/releases/latest/download/VaultUnlocked.jar"

          echo "[7/15] EssentialsX..."
          curl -fSL -o EssentialsX.jar "https://github.com/EssentialsX/Essentials/releases/download/2.21.0/EssentialsX-2.21.0.jar"

          echo "[8/15] EssentialsXChat..."
          curl -fSL -o EssentialsXChat.jar "https://github.com/EssentialsX/Essentials/releases/download/2.21.0/EssentialsXChat-2.21.0.jar"

          echo "[9/15] EssentialsXSpawn..."
          curl -fSL -o EssentialsXSpawn.jar "https://github.com/EssentialsX/Essentials/releases/download/2.21.0/EssentialsXSpawn-2.21.0.jar"

          # ── ECONOMY & SHOP ────────────────────────────────────

          echo "[10/15] GUIShop..."
          curl -fSL -o GUIShop.jar "https://github.com/pablo67340/GUIShop/releases/latest/download/GUIShop.jar"

          # ── PLAYER EXPERIENCE ─────────────────────────────────

          echo "[11/15] PlaceholderAPI..."
          PAPI_URL=$(curl -s "https://api.github.com/repos/PlaceholderAPI/PlaceholderAPI/releases/latest" | python3 -c "import sys,json; r=json.load(sys.stdin); print([a['browser_download_url'] for a in r['assets'] if a['name'].endswith('.jar')][0])")
          curl -fSL -o PlaceholderAPI.jar "$PAPI_URL"

          echo "[12/15] SkinsRestorer..."
          curl -fSL -o SkinsRestorer.jar "https://github.com/SkinsRestorer/SkinsRestorer/releases/latest/download/SkinsRestorer.jar"

          echo "[13/15] TAB..."
          TAB_URL=$(curl -s "https://api.github.com/repos/NEZNAMY/TAB/releases/latest" | python3 -c "import sys,json; r=json.load(sys.stdin); print([a['browser_download_url'] for a in r['assets'] if a['name'].endswith('.jar')][0])")
          curl -fSL -o TAB.jar "$TAB_URL"

          echo "[14/15] TreeAssist..."
          TA_URL=$(curl -s "https://api.github.com/repos/nicuch/TreeAssist/releases/latest" | python3 -c "import sys,json; r=json.load(sys.stdin); print([a['browser_download_url'] for a in r['assets'] if a['name'].endswith('.jar')][0])")
          curl -fSL -o TreeAssist.jar "$TA_URL" || echo "⚠️ TreeAssist skip"

          echo "[15/15] ClearLag..."
          # Fetches from official build variant if GitHub release isn't directly formatted
          CL_URL=$(curl -s "https://api.github.com/repos/JOPHESTUS/ClearLag/releases/latest" | python3 -c "import sys,json; r=json.load(sys.stdin); assets=[a['browser_download_url'] for a in r.get('assets', []) if a['name'].endswith('.jar')]; print(assets[0] if assets else '')")
          if [ -n "$CL_URL" ]; then
            curl -fSL -o ClearLag.jar "$CL_URL"
          else
            echo "⚠️ ClearLag direct GitHub file not found, fetching fallback..."
            curl -fSL -o ClearLag.jar "https://github.com/JOPHESTUS/ClearLag/releases/latest/download/Clearlag.jar" || echo "⚠️ ClearLag skip"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Plugins downloaded successfully:"
          ls -lh *.jar 2>/dev/null || echo "(none)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ══════════════════════════════════════════
      # 8. Setup GUIShop config (pre-built shop)
      # ══════════════════════════════════════════
      - name: 🛒 Setup GUIShop Config
        run: |
          mkdir -p plugins/GUIShop

          if [ ! -f plugins/GUIShop/shops.yml ]; then
            cat > plugins/GUIShop/shops.yml << 'EOF'
          shops:
            Blocks:
              pages:
                Page0:
                  '0':
                    type: SHOP
                    id: STONE
                    buy-price: 5
                    sell-price: 2
                    shop-name: '&7Stone'
                  '1':
                    type: SHOP
                    id: COBBLESTONE
                    buy-price: 3
                    sell-price: 1
                    shop-name: '&7Cobblestone'
                  '2':
                    type: SHOP
                    id: DIRT
                    buy-price: 2
                    sell-price: 1
                    shop-name: '&6Dirt'
                  '3':
                    type: SHOP
                    id: SAND
                    buy-price: 4
                    sell-price: 2
                    shop-name: '&eSand'
                  '4':
                    type: SHOP
                    id: GRAVEL
                    buy-price: 4
                    sell-price: 2
                    shop-name: '&8Gravel'
                  '5':
                    type: SHOP
                    id: OAK_LOG
                    buy-price: 8
                    sell-price: 4
                    shop-name: '&6Oak Log'
                  '6':
                    type: SHOP
                    id: OAK_PLANKS
                    buy-price: 3
                    sell-price: 1
                    shop-name: '&6Oak Planks'
                  '7':
                    type: SHOP
                    id: GLASS
                    buy-price: 10
                    sell-price: 3
                    shop-name: '&bGlass'
                  '8':
                    type: SHOP
                    id: OBSIDIAN
                    buy-price: 50
                    sell-price: 20
                    shop-name: '&5Obsidian'
            Ores:
              pages:
                Page0:
                  '0':
                    type: SHOP
                    id: COAL
                    buy-price: 8
                    sell-price: 4
                    shop-name: '&8Coal'
                  '1':
                    type: SHOP
                    id: IRON_INGOT
                    buy-price: 20
                    sell-price: 10
                    shop-name: '&7Iron Ingot'
                  '2':
                    type: SHOP
                    id: GOLD_INGOT
                    buy-price: 35
                    sell-price: 18
                    shop-name: '&6Gold Ingot'
                  '3':
                    type: SHOP
                    id: DIAMOND
                    buy-price: 150
                    sell-price: 80
                    shop-name: '&bDiamond'
                  '4':
                    type: SHOP
                    id: EMERALD
                    buy-price: 100
                    sell-price: 50
                    shop-name: '&aEmerald'
                  '5':
                    type: SHOP
                    id: NETHERITE_INGOT
                    buy-price: 500
                    sell-price: 300
                    shop-name: '&8Netherite'
                  '6':
                    type: SHOP
                    id: LAPIS_LAZULI
                    buy-price: 10
                    sell-price: 5
                    shop-name: '&9Lapis'
                  '7':
                    type: SHOP
                    id: REDSTONE
                    buy-price: 8
                    sell-price: 3
                    shop-name: '&cRedstone'
                  '8':
                    type: SHOP
                    id: QUARTZ
                    buy-price: 12
                    sell-price: 5
                    shop-name: '&fQuartz'
            Food:
              pages:
                Page0:
                  '0':
                    type: SHOP
                    id: BREAD
                    buy-price: 8
                    sell-price: 3
                    shop-name: '&6Bread'
                  '1':
                    type: SHOP
                    id: COOKED_BEEF
                    buy-price: 12
                    sell-price: 5
                    shop-name: '&6Steak'
                  '2':
                    type: SHOP
                    id: COOKED_CHICKEN
                    buy-price: 10
                    sell-price: 4
                    shop-name: '&eChicken'
                  '3':
                    type: SHOP
                    id: GOLDEN_APPLE
                    buy-price: 80
                    sell-price: 40
                    shop-name: '&6Golden Apple'
                  '4':
                    type: SHOP
                    id: ENCHANTED_GOLDEN_APPLE
                    buy-price: 500
                    sell-price: 0
                    shop-name: '&dGod Apple'
                  '5':
                    type: SHOP
                    id: COOKED_PORKCHOP
                    buy-price: 10
                    sell-price: 4
                    shop-name: '&6Porkchop'
            Farming:
              pages:
                Page0:
                  '0':
                    type: SHOP
                    id: WHEAT_SEEDS
                    buy-price: 3
                    sell-price: 1
                    shop-name: '&aWheat Seeds'
                  '1':
                    type: SHOP
                    id: WHEAT
                    buy-price: 5
                    sell-price: 2
                    shop-name: '&eWheat'
                  '2':
                    type: SHOP
                    id: CARROT
                    buy-price: 4
                    sell-price: 2
                    shop-name: '&6Carrot'
                  '3':
                    type: SHOP
                    id: POTATO
                    buy-price: 4
                    sell-price: 2
                    shop-name: '&ePotatot'
                  '4':
                    type: SHOP
                    id: SUGAR_CANE
                    buy-price: 5
                    sell-price: 2
                    shop-name: '&aSugar Cane'
                  '5':
                    type: SHOP
                    id: CACTUS
                    buy-price: 5
                    sell-price: 2
                    shop-name: '&2Cactus'
            MobDrops:
              pages:
                Page0:
                  '0':
                    type: SHOP
                    id: STRING
                    buy-price: 5
                    sell-price: 2
                    shop-name: '&fString'
                  '1':
                    type: SHOP
                    id: BONE
                    buy-price: 5
                    sell-price: 2
                    shop-name: '&fBone'
                  '2':
                    type: SHOP
                    id: GUNPOWDER
                    buy-price: 10
                    sell-price: 5
                    shop-name: '&8Gunpowder'
                  '3':
                    type: SHOP
                    id: ENDER_PEARL
                    buy-price: 30
                    sell-price: 15
                    shop-name: '&5Ender Pearl'
                  '4':
                    type: SHOP
                    id: BLAZE_ROD
                    buy-price: 25
                    sell-price: 12
                    shop-name: '&6Blaze Rod'
                  '5':
                    type: SHOP
                    id: LEATHER
                    buy-price: 8
                    sell-price: 4
                    shop-name: '&6Leather'
                  '6':
                    type: SHOP
                    id: SPIDER_EYE
                    buy-price: 8
                    sell-price: 4
                    shop-name: '&cSpider Eye'
                  '7':
                    type: SHOP
                    id: ROTTEN_FLESH
                    buy-price: 2
                    sell-price: 1
                    shop-name: '&2Rotten Flesh'
                  '8':
