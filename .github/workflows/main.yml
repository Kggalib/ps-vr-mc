          EOF
            echo "✅ GUIShop config created"
          else
            echo "✅ Existing GUIShop config kept"
          fi

          if [ ! -f plugins/GUIShop/menu.yml ]; then
            cat > plugins/GUIShop/menu.yml << 'EOF'
          menu:
            rows: 3
            title: '&8» &b&lSTAR SMP &8| &7Shop'
            items:
              '10':
                type: BUTTON
                id: STONE
                name: '&7&lBlocks'
                lore:
                  - '&8Buy & Sell building blocks'
                shop: Blocks
              '12':
                type: BUTTON
                id: DIAMOND
                name: '&b&lOres & Gems'
                lore:
                  - '&8Buy & Sell ores and gems'
                shop: Ores
              '14':
                type: BUTTON
                id: BREAD
                name: '&6&lFood'
                lore:
                  - '&8Buy & Sell food items'
                shop: Food
              '16':
                type: BUTTON
                id: WHEAT
                name: '&a&lFarming'
                lore:
                  - '&8Buy & Sell farming items'
                shop: Farming
              '22':
                type: BUTTON
                id: BONE
                name: '&f&lMob Drops'
                lore:
